  <script data-cfasync="false">
    (function () {
      const themeKey = 'theme';
      const themes = { light: 'light', dark: 'dark', system: 'system' };

      function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function getStoredTheme() {
        return localStorage.getItem(themeKey);
      }
      function getCurrentTheme() {
        const stored = getStoredTheme();
        if (stored && stored !== themes.system) {
          return stored;
        }
        return getSystemTheme();
      }
      function setTheme(theme) {
        const root = document.documentElement;
        if (theme === themes.system) {
          theme = getSystemTheme();
        }
        if (theme === themes.dark) {
          root.setAttribute('data-theme', 'dark');
        } else {
          root.removeAttribute('data-theme');
        }
        updateToggleButton(theme);
        updateGiscusTheme(theme);
      }
      function updateToggleButton(theme) {
        const button = document.getElementById('theme-toggle');
        if (button) {
          const nextAction = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode';
          button.setAttribute('aria-label', nextAction);
          button.setAttribute('title', nextAction);
        }
      }
      function updateGiscusTheme(theme) {
        const iframe = document.querySelector('iframe.giscus-frame');
        if (!iframe || !iframe.contentWindow) {
          return;
        }
        const giscusThemeMap = window.__giscusThemeMap || { light: 'light', dark: 'dark' };
        iframe.contentWindow.postMessage(
          {
            giscus: {
              setConfig: {
                theme: theme === 'dark' ? giscusThemeMap.dark : giscusThemeMap.light
              }
            }
          },
          'https://giscus.app'
        );
      }
      function ensureButtonUpdated() {
        updateToggleButton(getCurrentTheme());
      }
      function initTheme() {
        const stored = getStoredTheme();
        let theme;
        if (stored) {
          theme = stored === themes.system ? getSystemTheme() : stored;
          setTheme(stored);
        } else {
          
          theme = getSystemTheme();
          setTheme(themes.system);
        }
      }
      function toggleTheme() { 
        const current = getStoredTheme() || themes.system;
        let next;
        if (current === themes.system) {
          next = getSystemTheme() === 'dark' ? themes.light : themes.dark;
        } else if (current === themes.dark) {
          next = themes.light;
        } else {
          next = themes.dark;
        }
        localStorage.setItem(themeKey, next);
        setTheme(next);
      }

      
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
        const stored = getStoredTheme();
        if (!stored || stored === themes.system) {
          setTheme(themes.system);
        }
      });

      
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', ensureButtonUpdated);
      } else {
        
        ensureButtonUpdated();
      }

      
      window.toggleTheme = toggleTheme;

      
      initTheme();
    })();
  </script>

<button class="shortcut-hint" id="shortcut-hint" type="button" aria-label="显示快捷键帮助">?</button>

<script>
  (function () {
    const overlay = document.getElementById('shortcut-overlay');
    const hint = document.getElementById('shortcut-hint');
    const article = document.getElementById('article');
    const postContent = document.getElementById('post-content');
    const comments = document.getElementById('post-comments');
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const prevUrl = article ? article.dataset.shortcutPrev : '';
    const nextUrl = article ? article.dataset.shortcutNext : '';
    let gSequenceAt = 0;

    function isEditableTarget(target) {
      if (!target) {
        return false;
      }
      const tagName = target.tagName;
      if (!tagName) {
        return false;
      }
      if (target.isContentEditable) {
        return true;
      }
      return ['INPUT', 'TEXTAREA', 'SELECT', 'BUTTON'].includes(tagName);
    }

    function scrollPageBy(top) {
      window.scrollBy({
        top,
        behavior: prefersReducedMotion ? 'auto' : 'smooth'
      });
    }

    function scrollToPosition(top) {
      window.scrollTo({
        top,
        behavior: prefersReducedMotion ? 'auto' : 'smooth'
      });
    }

    function scrollToElement(element) {
      if (!element) {
        return;
      }
      const top = element.getBoundingClientRect().top + window.scrollY - 12;
      scrollToPosition(Math.max(top, 0));
    }

    function navigateTo(url) {
      if (!url) {
        return;
      }
      window.location.href = url;
    }

    function toggleOverlay(force) {
      if (!overlay) {
        return;
      }
      const shouldShow = typeof force === 'boolean' ? force : overlay.hidden;
      overlay.hidden = !shouldShow;
    }

    function updateShortcutAvailability() {
      const availability = {
        content: Boolean(postContent),
        comments: Boolean(comments),
        prev: Boolean(prevUrl),
        next: Boolean(nextUrl)
      };

      document.querySelectorAll('[data-requires]').forEach(function (node) {
        node.hidden = !availability[node.dataset.requires];
      });
    }

    document.addEventListener('keydown', function (event) {
      if (event.defaultPrevented || event.metaKey || event.ctrlKey || event.altKey) {
        return;
      }

      if (isEditableTarget(event.target)) {
        return;
      }

      if (event.key === '?') {
        event.preventDefault();
        toggleOverlay();
        return;
      }

      if (!overlay.hidden && event.key === 'Escape') {
        event.preventDefault();
        toggleOverlay(false);
        return;
      }

      if (!overlay.hidden) {
        return;
      }

      const viewportStep = Math.max(window.innerHeight * 0.12, 72);
      const halfPage = window.innerHeight * 0.5;

      if (event.key === 'j') {
        event.preventDefault();
        scrollPageBy(viewportStep);
        return;
      }

      if (event.key === 'k') {
        event.preventDefault();
        scrollPageBy(-viewportStep);
        return;
      }

      if (event.key === 'd') {
        event.preventDefault();
        scrollPageBy(halfPage);
        return;
      }

      if (event.key === 'u') {
        event.preventDefault();
        scrollPageBy(-halfPage);
        return;
      }

      if (event.key === 's' && typeof window.toggleTheme === 'function') {
        event.preventDefault();
        window.toggleTheme();
        return;
      }

      if (event.key === 'g') {
        const now = Date.now();
        if (now - gSequenceAt < 600) {
          event.preventDefault();
          gSequenceAt = 0;
          scrollToPosition(0);
          return;
        }
        gSequenceAt = now;
        return;
      }

      gSequenceAt = 0;

      if (event.key === 'G') {
        event.preventDefault();
        scrollToPosition(document.documentElement.scrollHeight);
        return;
      }

      if (event.key === 't' && postContent) {
        event.preventDefault();
        scrollToElement(postContent);
        return;
      }

      if (event.key === 'c' && comments) {
        event.preventDefault();
        scrollToElement(comments);
        return;
      }

      if (event.key === '[' && prevUrl) {
        event.preventDefault();
        navigateTo(prevUrl);
        return;
      }

      if (event.key === ']' && nextUrl) {
        event.preventDefault();
        navigateTo(nextUrl);
      }
    });

    if (overlay) {
      overlay.addEventListener('click', function (event) {
        if (event.target === overlay) {
          toggleOverlay(false);
        }
      });
    }

    if (hint) {
      hint.addEventListener('click', function () {
        toggleOverlay(true);
      });
    }

    updateShortcutAvailability();
  })();
</script>
